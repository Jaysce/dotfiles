# Fresh tmux foundation
# Keep this native and dependency-light; add plugin layers only after the core
# workflow is comfortable.

##### Prefix and reset ########################################################

unbind-key -a
set -g prefix C-s
bind-key C-s send-prefix

##### Core behavior ###########################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-overrides ",*256col*:Tc"
set -g allow-passthrough on
set -g focus-events on
set -g set-clipboard on

set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g aggressive-resize on

set-environment -g TMUX_CONFIG_DIR "$HOME/.config/tmux"

##### Status line #############################################################

set -g status on
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-style "bg=#1f1f28,fg=#dcd7ba"
set -g status-left "#[bg=#e46876,fg=#16161d,bold] #S #[bg=#1f1f28,fg=#e46876] "
set -g status-right "#[fg=#98bb6c]#{b:pane_current_path} #[fg=#7fb4ca]#h #[fg=#dca561]%H:%M "

set -g window-status-separator ""
set -g window-status-format "#[fg=#727169] #I:#W "
set -g window-status-current-format "#[bg=#7e9cd8,fg=#16161d,bold] #I:#W #[bg=#1f1f28,fg=#7e9cd8] "

set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#7e9cd8"
set -g display-panes-active-colour "#e46876"
set -g display-panes-colour "#7e9cd8"
set -g message-style "bg=#2a2a37,fg=#dcd7ba"

##### Windows and panes #######################################################

bind-key n new-window -c "#{pane_current_path}"
bind-key r command-prompt -I "#{window_name}" -p "Window name:" "rename-window '%%'"
bind-key s command-prompt -I "#{session_name}" -p "Session name:" "rename-session '%%'"

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key x confirm-before -p "Kill pane? (y/n)" kill-pane
bind-key X confirm-before -p "Kill window? (y/n)" kill-window
bind-key z resize-pane -Z
bind-key * setw synchronize-panes

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r L resize-pane -R 5

bind-key -n M-n next-window
bind-key -n M-p previous-window

##### Copy mode ###############################################################

bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy || pbcopy || xclip -selection clipboard"
bind-key -T copy-mode-vi Escape send-keys -X cancel

##### Popups and pickers ######################################################

bind-key c run-shell "~/.local/bin/tmux-popup -s xsmall -t Shell -E ~/.local/bin/tmux-quick-shell"
bind-key g run-shell "~/.local/bin/tmux-popup -s large -t Lazygit -E lazygit"
bind-key f run-shell "~/.local/bin/tmux-popup -s large -t Files -E ~/.local/bin/tmux-fzf-files"
bind-key p run-shell "~/.local/bin/tmux-popup -s large -t Projects -E ~/.local/bin/tmux-fzf-projects"

##### Sessions and utilities #################################################

bind-key d detach-client
bind-key q confirm-before -p "Kill session? (y/n)" kill-session
bind-key Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind-key : command-prompt
bind-key ? list-keys
