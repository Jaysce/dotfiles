# Fresh tmux foundation
# Keep this native and dependency-light; add plugin layers only after the core
# workflow is comfortable.

##### Prefix and reset ########################################################

unbind-key -a
set -g prefix C-s
bind-key C-s send-prefix

##### Core behavior ###########################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-overrides ",*256col*:Tc"
set -g allow-passthrough on
set -g focus-events on
set -g set-clipboard on

set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g aggressive-resize on

set-environment -g TMUX_CONFIG_DIR "$HOME/.config/tmux"

##### Status line #############################################################

set -g status on
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 120
set -g status-left ""

set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#7e9cd8"
set -g display-panes-active-colour "#e46876"
set -g display-panes-colour "#7e9cd8"
set -g message-style "bg=#2a2a37,fg=#dcd7ba"

##### Windows and panes #######################################################

bind-key n new-window -c "#{pane_current_path}"
bind-key r command-prompt -I "#{window_name}" -p "Window name:" "rename-window '%%'"
bind-key s command-prompt -I "#{session_name}" -p "Session name:" "rename-session '%%'"

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key x confirm-before -p "Kill pane? (y/n)" kill-pane
bind-key X confirm-before -p "Kill window? (y/n)" kill-window
bind-key z resize-pane -Z
bind-key * setw synchronize-panes

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r L resize-pane -R 5

bind-key -n M-n next-window
bind-key -n M-p previous-window

##### Copy mode ###############################################################

bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy || pbcopy || xclip -selection clipboard"
bind-key -T copy-mode-vi Escape send-keys -X cancel

##### Sessions and utilities #################################################

bind-key d detach-client
bind-key q confirm-before -p "Kill session? (y/n)" kill-session
bind-key Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind-key R run-shell "rm -rf ~/.cache/tmux-powerkit/data/*" \; source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind-key : command-prompt
bind-key ? list-keys

##### Plugins #################################################################

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins/"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "fabioluciano/tmux-powerkit"
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @powerkit_theme "pastel"
set -g @powerkit_theme_variant "dark"
set -g @powerkit_status_order "session,plugins"
set -g @powerkit_separator_style "none"
set -g @powerkit_edge_separator_style "none"
set -g @powerkit_plugins "git,hostname"
set -g @powerkit_elements_spacing "false"
set -g @powerkit_transparent "true"
set -g @powerkit_reload_config_key ""
set -g @powerkit_active_window_show_index "false"
set -g @powerkit_inactive_window_show_index "false"

set -g @powerkit_plugin_git_icon " "
set -g @powerkit_plugin_hostname_icon " "

if-shell "test -x '$HOME/.local/share/tmux/plugins/tpm/tpm'" \
  "run '$HOME/.local/share/tmux/plugins/tpm/tpm'" \
  "display-message 'TPM is not installed; clone tmux-plugins/tpm to ~/.local/share/tmux/plugins/tpm'"
